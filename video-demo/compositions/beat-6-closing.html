    <script>
      (function drawClosingDust() {
        const canvas = document.querySelector("#beat-6-closing .closing-dust");
        const context = canvas.getContext("2d");
        let seed = 0x1a2b3c4d;

        function seededUnit() {
          seed |= 0;
          seed = (seed + 0x6d2b79f5) | 0;
          let value = Math.imul(seed ^ (seed >>> 15), 1 | seed);
          value = (value + Math.imul(value ^ (value >>> 7), 61 | value)) ^ value;
          return ((value ^ (value >>> 14)) >>> 0) / 4294967296;
        }

        context.clearRect(0, 0, 1920, 1080);
        for (let index = 0; index < 44; index += 1) {
          const x = 110 + seededUnit() * 1680;
          const y = 70 + seededUnit() * 920;
          const radius = 0.55 + seededUnit() * 1.35;
          const alpha = 0.18 + seededUnit() * 0.42;
          context.beginPath();
          context.arc(x, y, radius, 0, Math.PI * 2);
          context.fillStyle = `rgba(240, 180, 41, ${alpha.toFixed(3)})`;
          context.fill();
        }
      })();
    </script>

        const ringEntrances = [

          { selector: ".connector-center", start: 0.43, duration: 0.22, ease: "circ.out" },

        connectorEntrances.forEach(function drawConnector(connector) {

            { strokeDashoffset: 100, opacity: 0 },
            {
              strokeDashoffset: 0,
              opacity: 1,
              duration: connector.duration,

            },
            connector.start,

        const cadenceEntrances = [

            offset: 48,
            duration: 0.32,
            ease: "power4.out",

            offset: 32,
            duration: 0.31,
            ease: "expo.out",

            node: ".node-right",
            start: 0.62,
            offset: 18,
            duration: 0.33,
            ease: "circ.out",
          },
        ];
        cadenceEntrances.forEach(function landCadence(item) {
          timeline.fromTo(
            `${root} ${item.word}`,
            { y: item.offset, opacity: 0 },
            {
              y: 0,
              opacity: 1,
              duration: item.duration,
              ease: item.ease,

          timeline.fromTo(
            `${root} ${item.node}`,
            { scale: 0, opacity: 0 },

              scale: 1,
              opacity: 1,
              duration: 0.18,
              ease: "back.out(1.25)",

            item.start,

          timeline.fromTo(

            { scale: 1 },
            {
              scale: 1.32,
              duration: 0.08,
              ease: "sine.out",
              yoyo: true,
              repeat: 1,
              immediateRender: false,
            },
            item.start + item.duration - 0.16,

        });

        timeline.fromTo(
          `${root} .project-word:nth-child(1)`,

          { y: 0, opacity: 1, duration: 0.31, ease: "power3.out" },

        timeline.fromTo(

              duration: 0.33 - index * 0.04,

              duration: 0.33 - index * 0.04,
              ease: index === 0 ? "power2.out" : "expo.out",

            1.05 + index * 0.04,

        timeline.fromTo(
