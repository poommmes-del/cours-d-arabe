    <style>

      #beat-3-library {

      }

      .capture-surface {

        height: 1080px;

      .plane-annotations {

    <script>
      (function buildBeatThreeTimeline() {
        window.__timelines = window.__timelines || {};

        const root = "#beat-3-library";
        const timeline = gsap.timeline({ paused: true });

        timeline.addLabel("transition-clear", 0);
        timeline.addLabel("camera-push", 0.18);
        timeline.addLabel("discipline-tour", 1);
        timeline.addLabel("catalogue-glide", 2.2);
        timeline.addLabel("copy-build", 2.7);
        timeline.addLabel("resolved-hold", 4.6);

        timeline.fromTo(
          `${root} .camera-rig`,
          { scale: 0.98, rotationY: -2, z: -40 },
          {
            scale: 1.055,
            rotationY: 0,
            z: 0,
            duration: 1.92,
            ease: "power2.inOut",
          },
          0.18,
        );

        timeline.fromTo(
          `${root} .catalogue-world`,
          { x: 0, y: 0 },
          {
            x: -90,
            y: -110,
            duration: 2.15,
            ease: "power3.inOut",
          },
          2.2,
        );

        timeline.fromTo(
          `${root} .front-focus-route`,
          { strokeDashoffset: 1000, opacity: 0 },
          {
            strokeDashoffset: 0,
            opacity: 0.72,
            duration: 2.15,
            ease: "none",
          },
          1,
        );

        timeline.fromTo(
          `${root} .front-focus-node`,
          { scale: 0, opacity: 0 },
          {
            scale: 1,
            opacity: 1,
            duration: 0.28,
            ease: "back.out(1.2)",
          },
          1,
        );

        const frontNode = document.querySelector("#beat-3-library .front-focus-node");
        const lowerNode = document.querySelector("#beat-3-library .lower-focus-node");
        const pathState = { progress: 0 };
        const HANDOFF_PROGRESS = 0.8;
        const FRONT_CURVE_SPLIT = 0.38;
        const frontStart = { x: 82, y: 321 };
        const sarfPoint = { x: 82, y: 671 };
        const frontHandoff = { x: 1348, y: 820 };
        const lowerHandoff = { x: 1271.374598, y: 706.057925 };
        const balaghaPoint = { x: 1354, y: 782 };

        function cubicBezierPoint(p0, p1, p2, p3, t) {
          const inverse = 1 - t;
          const inverseSquared = inverse * inverse;
          const tSquared = t * t;
          return {
            x:
              inverseSquared * inverse * p0.x +
              3 * inverseSquared * t * p1.x +
              3 * inverse * tSquared * p2.x +
              tSquared * t * p3.x,
            y:
              inverseSquared * inverse * p0.y +
              3 * inverseSquared * t * p1.y +
              3 * inverse * tSquared * p2.y +
              tSquared * t * p3.y,
          };
        }

        function pointOnFrontCurve(progress) {
          if (progress <= FRONT_CURVE_SPLIT) {
            return cubicBezierPoint(
              frontStart,
              { x: 42, y: 400 },
              { x: 42, y: 560 },
              sarfPoint,
              progress / FRONT_CURVE_SPLIT,
            );
          }

          return cubicBezierPoint(
            sarfPoint,
            { x: 350, y: 720 },
            { x: 880, y: 770 },
            frontHandoff,
            (progress - FRONT_CURVE_SPLIT) / (1 - FRONT_CURVE_SPLIT),
          );
        }

        function renderFocusPath() {
          const progress = pathState.progress;

          if (progress <= HANDOFF_PROGRESS) {
            const frontPoint = pointOnFrontCurve(progress / HANDOFF_PROGRESS);
            gsap.set(frontNode, { x: frontPoint.x, y: frontPoint.y });
            gsap.set(lowerNode, { x: lowerHandoff.x, y: lowerHandoff.y });
            return;
          }

          const lowerProgress = (progress - HANDOFF_PROGRESS) / (1 - HANDOFF_PROGRESS);
          const lowerPoint = cubicBezierPoint(
            lowerHandoff,
            { x: 1285, y: 730 },
            { x: 1320, y: 770 },
            balaghaPoint,
            lowerProgress,
          );
          gsap.set(frontNode, { x: frontHandoff.x, y: frontHandoff.y });
          gsap.set(lowerNode, { x: lowerPoint.x, y: lowerPoint.y });
        }

        renderFocusPath();

        timeline.fromTo(
          pathState,
          { progress: 0 },
          {
            progress: HANDOFF_PROGRESS,
            duration: 2.15,
            ease: "none",
            onUpdate: renderFocusPath,
          },
          1,
        );

        timeline.fromTo(
          `${root} .bracket-nahw`,
          { strokeDashoffset: 100, opacity: 0 },
          {
            strokeDashoffset: 0,
            opacity: 1,
            duration: 0.42,
            ease: "power2.out",
          },
          1.08,
        );

        timeline.fromTo(
          `${root} .bracket-sarf`,
          { strokeDashoffset: 100, opacity: 0 },
          {
            strokeDashoffset: 0,
            opacity: 1,
            duration: 0.44,
            ease: "power2.out",
          },
          1.82,
        );

        timeline.fromTo(
          `${root} .front-focus-node`,
          { opacity: 1 },
          {
            opacity: 0,
            duration: 0.12,
            ease: "sine.inOut",
            immediateRender: false,
          },
          3.15,
        );

        timeline.fromTo(
          `${root} .lower-focus-node`,
          { scale: 1, opacity: 0 },
          {
            scale: 1,
            opacity: 1,
            duration: 0.12,
            ease: "sine.inOut",
          },
          3.15,
        );

        timeline.fromTo(
          pathState,
          { progress: HANDOFF_PROGRESS },
          {
            progress: 1,
            duration: 0.53,
            ease: "none",
            onUpdate: renderFocusPath,
            immediateRender: false,
          },
          3.27,
        );

        timeline.fromTo(
          `${root} .lower-focus-route`,
          { strokeDashoffset: 1000, opacity: 0 },
          {
            strokeDashoffset: 0,
            opacity: 0.72,
            duration: 0.53,
            ease: "none",
          },
          3.27,
        );

        timeline.fromTo(
          `${root} .bracket-balagha`,
          { strokeDashoffset: 100, opacity: 0 },
          {
            strokeDashoffset: 0,
            opacity: 1,
            duration: 0.3,
            ease: "power2.out",
          },
          3.5,
        );

        timeline.fromTo(
          `${root} .category-rail`,
          { y: 24, opacity: 0 },
          {
            y: 0,
            opacity: 1,
            duration: 0.5,
            ease: "power3.out",
          },
          2.55,
        );

        timeline.fromTo(
          `${root} .token-nahw`,
          { x: 36, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.48, ease: "power3.out" },
          2.7,
        );

        timeline.fromTo(
          `${root} [data-hf-id="hf-b3-separator-one"]`,
          { x: 28, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.48, ease: "power3.out" },
          3.08,
        );

        timeline.fromTo(
          `${root} .token-sarf`,
          { x: 24, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.48, ease: "power3.out" },
          3.42,
        );

        timeline.fromTo(
          `${root} [data-hf-id="hf-b3-separator-two"]`,
          { x: 20, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.48, ease: "power3.out" },
          3.78,
        );

        timeline.fromTo(
          `${root} .token-balagha`,
          { x: 16, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.48, ease: "power3.out" },
          4.12,
        );

        timeline.fromTo(
          `${root} .camera-rig`,
          { scale: 1.055, rotationX: 0, z: 0 },
          {
            scale: 1.04,
            rotationX: -0.25,
            z: 0,
            duration: 1.15,
            ease: "sine.out",
            immediateRender: false,
          },
          4.6,
        );

        window.__timelines["beat-3-library"] = timeline;
      })();
    </script>
