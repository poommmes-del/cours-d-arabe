    <script>
      (function buildBeatTwoTimeline() {
        window.__timelines = window.__timelines || {};

        const root = "#beat-2-scale";
        const timeline = gsap.timeline({ paused: true });

        timeline.fromTo(
          `${root} .scale-field`,
          { opacity: 0 },
          { opacity: 1, duration: 0.32, ease: "sine.out" },
          0,
        );

        timeline.fromTo(
          `${root} .ghost-card-group`,
          { y: 18, opacity: 0 },
          { y: 0, opacity: 0.16, duration: 0.32, ease: "power2.out" },
          0,
        );

        timeline.fromTo(
          `${root} .numeric-tick-group`,
          { opacity: 0 },
          { opacity: 0.22, duration: 0.32, ease: "power1.out" },
          0,
        );

        const panels = [
          { selector: `${root} .panel-courses`, start: 0.04, duration: 0.78 },
          { selector: `${root} .panel-lessons`, start: 0.12, duration: 0.78 },
          { selector: `${root} .panel-hours`, start: 0.20, duration: 0.78 },
        ];

        panels.forEach(function assemblePanel(panel) {
          timeline.fromTo(
            panel.selector,
            {
              clipPath: "inset(0 100% 0 0)",
              rotationX: 6,
              z: -80,
              opacity: 0,
            },
            {
              clipPath: "inset(0 0% 0 0)",
              rotationX: 0,
              z: 0,
              opacity: 1,
              duration: panel.duration,
              ease: "power3.out",
            },
            panel.start,
          );
        });

        const values = [
          { selector: `${root} .panel-courses .stat-value`, target: 14, suffix: "" },
          { selector: `${root} .panel-lessons .stat-value`, target: 792, suffix: "" },
          { selector: `${root} .panel-hours .stat-value`, target: 664, suffix: "+" },
        ];

        values.forEach(function revealAndCountValue(value) {
          const element = document.querySelector(value.selector);
          const counter = { value: 0 };

          timeline.fromTo(
            value.selector,
            { y: 24, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.44, ease: "power3.out" },
            0.36,
          );

          timeline.fromTo(
            counter,
            { value: 0 },
            {
              value: value.target,
              duration: 1.19,
              ease: "power3.out",
              onUpdate: function renderCounter() {
                element.textContent = `${Math.round(counter.value)}${value.suffix}`;
              },
            },
            0.36,
          );
        });

        timeline.fromTo(
          `${root} .stat-noun`,
          { x: 24, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.42, ease: "power2.out" },
          0.48,
        );

        timeline.fromTo(
          `${root} .stat-separator`,
          { scale: 0.7, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.42, ease: "back.out(1.2)" },
          0.60,
        );

        timeline.fromTo(
          `${root} .panel-rule`,
          { scaleX: 0 },
          { scaleX: 1, duration: 1, ease: "power2.out" },
          0.70,
        );

        timeline.fromTo(
          `${root} .anchor-node`,
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 1, ease: "back.out(1.2)" },
          0.70,
        );

        timeline.fromTo(
          `${root} .connector-route`,
          { opacity: 0 },
          { opacity: 1, duration: 0.01, ease: "none" },
          1.15,
        );

        timeline.fromTo(
          `${root} .connector-path`,
          { strokeDashoffset: 1000 },
          { strokeDashoffset: 0, duration: 1.05, ease: "power2.out" },
          1.15,
        );

        const floats = [
          { selector: `${root} .panel-courses .panel-float`, y: -4, z: 4 },
          { selector: `${root} .panel-lessons .panel-float`, y: 4, z: -4 },
          { selector: `${root} .panel-hours .panel-float`, y: -4, z: 4 },
        ];

        floats.forEach(function floatPanel(panel) {
          timeline.fromTo(
            panel.selector,
            { y: 0, z: 0 },
            {
              y: panel.y,
              z: panel.z,
              duration: 0.52,
              ease: "sine.inOut",
              immediateRender: false,
            },
            2.20,
          );
          timeline.fromTo(
            panel.selector,
            { y: panel.y, z: panel.z },
            {
              y: 0,
              z: 0,
              duration: 0.51,
              ease: "sine.inOut",
              immediateRender: false,
            },
            2.72,
          );
          timeline.fromTo(
            panel.selector,
            { y: 0, z: 0 },
            {
              y: panel.y,
              z: panel.z,
              duration: 0.52,
              ease: "sine.inOut",
              immediateRender: false,
            },
            3.23,
          );
        });

        window.__timelines["beat-2-scale"] = timeline;
      })();
