      (function drawDeterministicDust() {
        const canvas = document.querySelector("#beat-1-hook .dust-field");
        const context = canvas.getContext("2d");
        let seed = 0x1a2b3c4d;

        function seededUnit() {
          seed |= 0;
          seed = (seed + 0x6d2b79f5) | 0;
          let value = Math.imul(seed ^ (seed >>> 15), 1 | seed);
          value = (value + Math.imul(value ^ (value >>> 7), 61 | value)) ^ value;
          return ((value ^ (value >>> 14)) >>> 0) / 4294967296;
        }

        context.clearRect(0, 0, 1920, 1080);
        for (let index = 0; index < 44; index += 1) {
          const x = 110 + seededUnit() * 1680;
          const y = 70 + seededUnit() * 920;
          const radius = 0.55 + seededUnit() * 1.35;
          const alpha = 0.18 + seededUnit() * 0.42;
          context.beginPath();
          context.arc(x, y, radius, 0, Math.PI * 2);
          context.fillStyle = `rgba(240, 180, 41, ${alpha.toFixed(3)})`;
          context.fill();
        }
      })();
    </script>
